# Nombre de la aplicación y puerto dinámico para Render
spring.application.name=lazarus-api
server.port=${PORT:8080}

# --- CONFIGURACIÓN DE BASE DE DATOS ---
# Usa variables de entorno si existen; de lo contrario, usa H2 en memoria
spring.datasource.url=${DB_URL:jdbc:h2:mem:webnotesdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
# Dialecto dinámico (H2 para local, PostgreSQL para la nube)
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Estrategia de nombrado para SQL (Naming Convention)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- H2 CONSOLE (Solo para desarrollo local) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Esto permite ver la consola de H2 si usas un navegador
spring.h2.console.settings.web-allow-others=true